    <section class="px-4 py-16 max-w-4xl mx-auto pt-32 relative min-h-screen">
        <div class="absolute inset-0 -z-10" style="background: linear-gradient(to bottom, rgba(123, 92, 232, 0.04), rgba(123, 92, 232, 0.06), rgba(123, 92, 232, 0.04)), linear-gradient(to bottom, rgba(5, 4, 8, 0.92), rgba(5, 4, 8, 0.88), rgba(5, 4, 8, 0.92));"></div>
        <div class="relative z-10 w-full">

                <h1 class="header-epic-1 mb-6">LORE</h1>
                <div class="decorator-line"></div>

            <div class="relative max-w-4xl mx-auto card p-8">
                <div class="absolute left-1/2 transform -translate-x-1/2 h-full w-1 bg-violet-primary/30"></div>
                <div class="space-y-12" id="timelineContainer">
                    <!-- Las eras se cargarán dinámicamente aquí -->
                </div>
            </div>
        </div>
    </section>

    <script>
        async function loadLoreSections() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            try {
                const response = await fetch('../content/guias/index.json');
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    // Reverse order: start from last era and go backwards
                    const reversedItems = [...data.items].reverse();
                    
                    reversedItems.forEach((era, index) => {
                        const originalIndex = data.items.length - 1 - index;
                        const timelineHTML = `
                            <div class="relative flex items-center fade-in" style="animation-delay: ${index * 0.1}s;">
                                <div class="w-1/2 pr-8 text-right">
                                    <h3 class="font-title text-xl text-violet-primary">✦ ${era.title}</h3>
                                </div>
                                <div onclick="showLore(${originalIndex})" class="timeline-node absolute left-1/2 transform -translate-x-1/2 w-8 h-8 bg-violet-primary rounded-full cursor-pointer border-4 border-bg-violet"></div>
                                <div class="w-1/2 pl-8"></div>
                            </div>
                            <div id="loreContent${originalIndex}" class="hidden card card-compact p-6 fade-in ml-16">
                                <img src="../images/era${originalIndex + 1}.jpg" alt="${era.title}" class="w-full h-32 object-cover rounded-lg mb-4" onerror="this.style.display='none'">
                                <p class="text-gray-300">${era.description}</p>
                                <a href="${era.path.replace('./', '../')}index.html" class="mt-4 inline-block btn-primary text-center">
                                    Ver detalles completos
                                </a>
                            </div>
                        `;
                        container.innerHTML += timelineHTML;
                    });
                } else {
                    container.innerHTML = '<p class="text-silver-muted text-center">No hay lore disponible.</p>';
                }
            } catch (error) {
                console.error('Error loading lore:', error);
                container.innerHTML = '<p class="text-red-400 text-center">Error al cargar el lore.</p>';
            }
        }

        function showLore(index) {
            const contents = document.querySelectorAll('[id^="loreContent"]');
            contents.forEach(content => {
                if (content.id === `loreContent${index}`) {
                    content.classList.remove('hidden');
                    content.classList.add('fade-in');
                } else {
                    content.classList.add('hidden');
                    content.classList.remove('fade-in');
                }
            });
        }

        document.addEventListener('DOMContentLoaded',function(){
            loadLoreSections();
        });
    </script>
