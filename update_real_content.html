        // Función para codificar contenido
        function enc(d) {
            return btoa(unescape(encodeURIComponent(d)));
        }

        // Función para decodificar contenido (para verificar)
        function dec(d) {
            try {
                return decodeURIComponent(escape(atob(d)));
            } catch (e) {
                return d;
            }
        }

        // Actualizar localStorage con el nuevo contenido
        function updateContent() {
            // Actualizar ciudades
            citiesContent.forEach((city, index) => {
                localStorage.setItem(`admin_city${index}_name`, city.name);
                localStorage.setItem(`admin_city${index}`, enc(city.content));
            });
            
            // Asegurar que el contador esté en 4
            localStorage.setItem('admin_city_counter', '4');
            
            // Actualizar lore
            loreContent.forEach((era, index) => {
                localStorage.setItem(`admin_lore${index}_name`, era.name);
                localStorage.setItem(`admin_lore${index}`, enc(era.content));
            });
            
            // Asegurar que el contador esté en 5
            localStorage.setItem('admin_lore_counter', '5');
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="success">
                    <h2>¡Contenido actualizado exitosamente!</h2>
                    <p><strong>Ciudades:</strong> ${citiesContent.map(c => c.name).join(', ')}</p>
                    <p><strong>Eras de Lore:</strong> ${loreContent.map(l => l.name).join(', ')}</p>
                    <p class="info">Ahora puedes cerrar esta página y visitar ciudades.html o lore.html para ver el nuevo contenido.</p>
                </div>
            `;
            
            console.log('Contenido actualizado exitosamente');
            console.log('Ciudades:', citiesContent.map(c => c.name));
            console.log('Eras de Lore:', loreContent.map(l => l.name));
            
            // Verificar que el contenido se guardó correctamente
            console.log('Verificación de contenido guardado:');
            citiesContent.forEach((city, index) => {
                const saved = localStorage.getItem(`admin_city${index}`);
                const decoded = dec(saved);
                console.log(`Ciudad ${index} - Longitud guardada: ${saved.length}, Longitud decodificada: ${decoded.length}`);
            });
        }
    </script>
