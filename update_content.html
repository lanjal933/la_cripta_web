<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Contenido Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #09070f;
            color: #f8fafc;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background: #13101c;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #8b5cf6;
        }
        h1 {
            color: #8b5cf6;
            margin-bottom: 20px;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #7c3aed;
        }
        .success {
            color: #10b981;
            margin-top: 20px;
            font-size: 18px;
        }
        .info {
            color: #6b7280;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Actualizar Contenido de Admin</h1>
        <p>Este script actualizará el contenido de ciudades y lore en localStorage con nuevo contenido HTML/CSS estilizado.</p>
        <p class="info">Haz clic en el botón para ejecutar la actualización.</p>
        <button onclick="updateContent()">Actualizar Contenido</button>
        <div id="result"></div>
    </div>

    <script>
        // Contenido para ciudades (4 ciudades)
        const citiesContent = [
            {
                name: "Aethelgard",
                content: `<div class="space-y-4">
    <p class="text-gray-300 leading-relaxed">
        La <span class="text-neon-violet font-semibold">Ciudad de los Ecos</span> se alza sobre las ruinas de una civilización olvidada, donde las paredes de obsidiana retienen los susurros de milenios pasados. Sus torres retorcidas alcanzan el cielo como dedos de piedra, mientras el brillo púrpura de los cristales mágicos ilumina las calles laberínticas.
    </p>
    <div class="border-l-2 border-neon-violet/50 pl-4 py-2 bg-neon-violet/5 rounded-r">
        <p class="text-sm text-gray-400 italic">
            "En Aethelgard, el pasado nunca muere... solo espera ser escuchado."
        </p>
    </div>
    <div class="flex gap-2 mt-3">
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Artesanía Arcana</span>
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Comercio de Reliquias</span>
    </div>
</div>`
            },
            {
                name: "Valthor's Reach",
                content: `<div class="space-y-4">
    <p class="text-gray-300 leading-relaxed">
        <span class="text-neon-violet font-semibold">El Alcance de Valthor</span> es una fortaleza de hierro y sombra, construida sobre un acantilado que cae hacia el vacío eterno. Aquí, los herreros forjan armas con metales que no existen en ningún otro lugar, y los guardias patrullan con armaduras que parecen absorber la luz misma.
    </p>
    <div class="border-l-2 border-neon-violet/50 pl-4 py-2 bg-neon-violet/5 rounded-r">
        <p class="text-sm text-gray-400 italic">
            "El acero de Valthor no corta carne... corta destinos."
        </p>
    </div>
    <div class="flex gap-2 mt-3">
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Forjado Maestro</span>
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Defensa Impenetrable</span>
    </div>
</div>`
            },
            {
                name: "Mysthaven",
                content: `<div class="space-y-4">
    <p class="text-gray-300 leading-relaxed">
        <span class="text-neon-violet font-semibold">Mysthaven</span>, el Refugio de los Misterios, flota entre las dimensiones como un espejismo de neblina y luz. Sus habitantes son magos exiliados de todas las esferas, que han encontrado en este lugar un santuario donde las leyes de la realidad son meras sugerencias.
    </p>
    <div class="border-l-2 border-neon-violet/50 pl-4 py-2 bg-neon-violet/5 rounded-r">
        <p class="text-sm text-gray-400 italic">
            "En Mysthaven, lo imposible es simplemente... inesperado."
        </p>
    </div>
    <div class="flex gap-2 mt-3">
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Investigación Arcana</span>
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Portales Dimensionales</span>
    </div>
</div>`
            },
            {
                name: "Shadowmere",
                content: `<div class="space-y-4">
    <p class="text-gray-300 leading-relaxed">
        <span class="text-neon-violet font-semibold">Sombra Eterna</span> se encuentra en el corazón del Bosque de los Susurros, donde los árboles tienen ojos y las sombras tienen voluntad propia. Es un lugar donde los asesinos y espías encuentran refugio, y donde cada transacción tiene un precio que va más allá del oro.
    </p>
    <div class="border-l-2 border-neon-violet/50 pl-4 py-2 bg-neon-violet/5 rounded-r">
        <p class="text-sm text-gray-400 italic">
            "En Shadowmere, la información es más valiosa que la vida misma."
        </p>
    </div>
    <div class="flex gap-2 mt-3">
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Red de Espías</span>
        <span class="px-2 py-1 bg-neon-violet/20 text-neon-violet text-xs rounded">Mercado Negro</span>
    </div>
</div>`
            }
        ];

        // Contenido para lore (3 eras)
        const loreContent = [
            {
                name: "La Era de los Titanes",
                content: `<div class="space-y-3">
    <p class="text-gray-300 leading-relaxed">
        Antes de que los humanos caminaran sobre la tierra, los <span class="text-neon-violet font-semibold">Titanes Primordiales</span> gobernaban este mundo. Seres de talla colosal, cuyos pasos creaban montañas y cuyo aliento formaba los océanos. Forjaron las primeras runas de poder y establecieron los pilares de la realidad que aún hoy sostienen el universo.
    </p>
    <div class="bg-dark-umbra/50 p-3 rounded border border-neon-violet/20">
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Duración:</span> ~10,000 años antes de la Era Común
        </p>
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Legado:</span> Las Runas Antiguas, los Pilares del Mundo
        </p>
    </div>
</div>`
            },
            {
                name: "La Guerra de las Sombras",
                content: `<div class="space-y-3">
    <p class="text-gray-300 leading-relaxed">
        Cuando los Titanes cayeron, surgieron las <span class="text-neon-violet font-semibold">Sombras Voraces</span> del vacío entre mundos. Una guerra que duró tres siglos devastó civilizaciones enteras, obligando a los supervivientes a refugiarse en ciudades fortificadas. Fue en este conflicto donde nacieron las primeras órdenes de magos guerreros.
    </p>
    <div class="bg-dark-umbra/50 p-3 rounded border border-neon-violet/20">
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Duración:</span> 300 años de conflicto continuo
        </p>
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Consecuencia:</span> Nacimiento de las Órdenes Mágicas
        </p>
    </div>
</div>`
            },
            {
                name: "El Despertar Actual",
                content: `<div class="space-y-3">
    <p class="text-gray-300 leading-relaxed">
        Ahora, en la <span class="text-neon-violet font-semibold">Era del Renacer</span>, las antiguas magias comienzan a despertar nuevamente. Los Pilares del Mundo crujen bajo el peso de realidades que intentan colapsar, y nuevos héroes deben surgir para enfrentar amenazas que el mundo había olvidado. La línea entre la luz y la oscuridad se desvanece.
    </p>
    <div class="bg-dark-umbra/50 p-3 rounded border border-neon-violet/20">
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Estado Actual:</span> Despertar de las Antiguas Magias
        </p>
        <p class="text-sm text-gray-400">
            <span class="text-neon-violet">Amenaza:</span> Colapso de los Pilares del Mundo
        </p>
    </div>
</div>`
            }
        ];

        // Función para codificar contenido
        function enc(d) {
            return btoa(unescape(encodeURIComponent(d)));
        }

        // Actualizar localStorage con el nuevo contenido
        function updateContent() {
            // Actualizar ciudades
            citiesContent.forEach((city, index) => {
                localStorage.setItem(`admin_city${index}_name`, city.name);
                localStorage.setItem(`admin_city${index}`, enc(city.content));
            });
            
            // Asegurar que el contador esté en 4
            localStorage.setItem('admin_city_counter', '4');
            
            // Actualizar lore
            loreContent.forEach((era, index) => {
                localStorage.setItem(`admin_lore${index}_name`, era.name);
                localStorage.setItem(`admin_lore${index}`, enc(era.content));
            });
            
            // Asegurar que el contador esté en 3
            localStorage.setItem('admin_lore_counter', '3');
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="success">
                    <h2>¡Contenido actualizado exitosamente!</h2>
                    <p><strong>Ciudades:</strong> ${citiesContent.map(c => c.name).join(', ')}</p>
                    <p><strong>Eras de Lore:</strong> ${loreContent.map(l => l.name).join(', ')}</p>
                    <p class="info">Ahora puedes cerrar esta página y visitar ciudades.html o lore.html para ver el nuevo contenido.</p>
                </div>
            `;
            
            console.log('Contenido actualizado exitosamente');
            console.log('Ciudades:', citiesContent.map(c => c.name));
            console.log('Eras de Lore:', loreContent.map(l => l.name));
        }
    </script>
</body>
</html>
